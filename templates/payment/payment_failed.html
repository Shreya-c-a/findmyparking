{% extends 'base.html' %}

{% block title %}Payment Failed - FindMyParking{% endblock %}

{% block content %}
<div class="premium-shell min-h-[70vh] flex items-center justify-center py-12 px-4">
    <div class="premium-panel text-center p-8 max-w-md w-full">
        <div
            class="w-20 h-20 bg-gradient-to-br from-red-400 to-red-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
            <span class="text-4xl text-white">❌</span>
        </div>
        <h1 class="premium-title text-2xl font-black text-gray-900 mb-2">Payment Failed</h1>
        <p class="text-gray-500 mb-8 max-w-sm mx-auto">Something went wrong with your payment. Please try again.</p>
        <div class="flex gap-4 justify-center">
            <a href="{% url 'my_reservations' %}"
                class="px-6 py-3 bg-gradient-to-r from-brand-500 to-brand-700 text-white rounded-xl font-semibold text-sm hover:shadow-lg transition-all">
                My Reservations
            </a>
            <a href="{% url 'home' %}"
                class="px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-xl font-semibold text-sm hover:bg-gray-50 transition-all">
                Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
