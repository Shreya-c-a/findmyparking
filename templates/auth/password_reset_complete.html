{% extends 'base.html' %}

{% block title %}Password Reset Complete - FindMyParking{% endblock %}

{% block content %}
<div class="auth-scene min-h-[85vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl shadow-card-hover border border-gray-100 p-8 text-center">
            <div class="w-14 h-14 bg-brand-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-brand-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            </div>
            <h1 class="premium-title text-2xl font-black text-gray-900">Password updated</h1>
            <p class="text-sm text-gray-500 mt-2">Your password has been reset successfully. You can now log in.</p>
            <a href="{% url 'login' %}" class="inline-block mt-6 px-5 py-3 rounded-xl bg-gradient-to-r from-brand-500 to-brand-600 text-white text-sm font-semibold hover:shadow-glow transition-all duration-300">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
