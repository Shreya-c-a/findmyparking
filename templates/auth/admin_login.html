{% extends 'base.html' %}

{% block title %}Admin Log In - FindMyParking{% endblock %}

{% block content %}
<div class="auth-scene min-h-[85vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl shadow-card-hover border border-gray-100 p-8">
            <div class="text-center mb-8">
                <a href="{% url 'home' %}" class="inline-flex items-center gap-2 mb-5">
                    <div class="w-10 h-10 bg-gradient-to-br from-slate-600 to-slate-800 rounded-[14px] flex items-center justify-center shadow-md">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M5.07 19h13.86c1.54 0 2.5-1.67 1.73-3L13.73 4c-.77-1.33-2.69-1.33-3.46 0L3.34 16c-.77 1.33.19 3 1.73 3z"/></svg>
                    </div>
                </a>
                <h1 class="premium-title text-2xl font-black text-gray-900">Admin Login</h1>
                <p class="text-sm text-gray-500 mt-1">Authorized admin access only</p>
            </div>

            {% if form.errors %}
            <div class="bg-red-50 border border-red-200 rounded-2xl p-4 mb-5">
                <p class="text-red-700 text-sm font-medium">Invalid admin email or password.</p>
            </div>
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Admin Email</label>
                    <input type="email" name="email" placeholder="admin@company.com" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:border-slate-500 focus:ring-2 focus:ring-slate-100 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:border-slate-500 focus:ring-2 focus:ring-slate-100 outline-none transition-all">
                </div>

                <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-slate-700 to-slate-900 text-white rounded-xl font-semibold text-sm hover:opacity-95 transition-all duration-300">
                    Log In as Admin
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                Not an admin? <a href="{% url 'login' %}" class="text-brand-600 font-semibold hover:underline">User login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
