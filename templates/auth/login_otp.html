{% extends 'base.html' %}

{% block title %}Verify OTP - FindMyParking{% endblock %}

{% block content %}
<div class="auth-scene min-h-[85vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl shadow-card-hover border border-gray-100 p-8">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-black text-gray-900">Verify Login OTP</h1>
                <p class="text-sm text-gray-500 mt-1">Enter the 6-digit code sent to your email.</p>
            </div>

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">One-Time Password</label>
                    <input
                        type="text"
                        name="otp"
                        maxlength="6"
                        minlength="6"
                        pattern="[0-9]{6}"
                        required
                        placeholder="123456"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm tracking-[0.3em] text-center focus:border-brand-400 focus:ring-2 focus:ring-brand-100 outline-none transition-all"
                    >
                </div>

                <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-brand-500 to-brand-600 text-white rounded-xl font-semibold text-sm hover:shadow-glow transition-all duration-300">
                    Verify & Login
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                Wrong email or code expired? <a href="{% url 'login' %}" class="text-brand-600 font-semibold hover:underline">Login again</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
